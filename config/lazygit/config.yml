promptToReturnFromSubprocess: false
gui:
  scrollHeight: 10
  scrollOffBehavior: jump
  nerdFontsVersion: "3"
  # everforest dark medium: https://github.com/neanias/everforest-nvim
  theme:
    activeBorderColor:
      - "#e69875"
      - "bold"
    inactiveBorderColor:
      - "#7fbbb3"
    searchingActiveBorderColor:
      - "#e69875"
      - "bold"
    optionsTextColor:
      - "#7fbbb3"
    selectedLineBgColor:
      - "#343f44"
    cherryPickedCommitFgColor:
      - "#7fbbb3"
    cherryPickedCommitBgColor:
      - "#d699b6"
    markedBaseCommitFgColor:
      - "#7fbbb3"
    markedBaseCommitBgColor:
      - "#dbbc7f"
    unstagedChangesColor:
      - "#e67e80"
    defaultFgColor:
      - "#d3c6aa"
customCommands:
  - key: <c-a>
    description: Pick AI commits
    command: |
      fzf_output=$(ai-commit-suggest | fzf --height 40% --border --ansi \
          --expect=alt-g \
          --header "<CR>: commit directly  |  <M-g>: edit before commit  |  <Esc>: cancel" \
          --preview "echo {}" --preview-window=up:wrap)
      pressed_key=$(printf '%s\n' "$fzf_output" | sed -n '1p')
      selected_msg=$(printf '%s\n' "$fzf_output" | sed -n '2p')
      if [ -z "$selected_msg" ]; then
          exit 0
      fi
      COMMIT_MSG_FILE=$(mktemp)
      echo "$selected_msg" > "$COMMIT_MSG_FILE"
      if [ "$pressed_key" = "alt-g" ]; then
          ${EDITOR:-vim} "$COMMIT_MSG_FILE"
      fi
      if [ -s "$COMMIT_MSG_FILE" ]; then
          git commit -F "$COMMIT_MSG_FILE"
      else
          echo "Commit message is empty, commit aborted."
      fi
      rm -f "$COMMIT_MSG_FILE"
    context: files
    output: terminal
  - key: <c-e>
    description: Elaborate AI commit (title + body)
    command: |
      COMMIT_MSG_FILE=$(mktemp)
      echo "Generating detailed commit message..."
      if ! ai-commit-suggest --detailed > "$COMMIT_MSG_FILE"; then
          echo "Generation failed."
          rm -f "$COMMIT_MSG_FILE"
          exit 1
      fi
      if [ ! -s "$COMMIT_MSG_FILE" ]; then
          echo "Empty output, aborted."
          rm -f "$COMMIT_MSG_FILE"
          exit 1
      fi
      ${EDITOR:-vim} "$COMMIT_MSG_FILE"
      if [ -s "$COMMIT_MSG_FILE" ]; then
          git commit -F "$COMMIT_MSG_FILE"
      else
          echo "Commit message is empty, commit aborted."
      fi
      rm -f "$COMMIT_MSG_FILE"
    context: files
    output: terminal
