promptToReturnFromSubprocess: false
gui:
  scrollHeight: 10
  scrollOffBehavior: jump
  nerdFontsVersion: "3"
  # everforest dark medium: https://github.com/neanias/everforest-nvim
  theme:
    activeBorderColor:
      - "#e69875"
      - "bold"
    inactiveBorderColor:
      - "#7fbbb3"
    searchingActiveBorderColor:
      - "#e69875"
      - "bold"
    optionsTextColor:
      - "#7fbbb3"
    selectedLineBgColor:
      - "#343f44"
    cherryPickedCommitFgColor:
      - "#7fbbb3"
    cherryPickedCommitBgColor:
      - "#d699b6"
    markedBaseCommitFgColor:
      - "#7fbbb3"
    markedBaseCommitBgColor:
      - "#dbbc7f"
    unstagedChangesColor:
      - "#e67e80"
    defaultFgColor:
      - "#d3c6aa"
customCommands:
  - key: <c-a>
    description: Pick AI commits
    command: |
      if [ -z "$(git diff --cached --name-only)" ]; then
          echo "No staged changes. Stage files first (space in files panel)."
          exit 0
      fi
      fzf_output=$(ai-commit-suggest | fzf --height 40% --border --ansi \
          --expect=alt-g \
          --header "<CR>: commit directly  |  <M-g>: edit before commit  |  <Esc>: cancel" \
          --preview "echo {}" --preview-window=up:wrap)
      pressed_key=$(printf '%s\n' "$fzf_output" | sed -n '1p')
      selected_msg=$(printf '%s\n' "$fzf_output" | sed -n '2p')
      if [ -z "$selected_msg" ]; then
          exit 0
      fi
      COMMIT_MSG_FILE=$(mktemp)
      echo "$selected_msg" > "$COMMIT_MSG_FILE"
      if [ "$pressed_key" = "alt-g" ]; then
          ${EDITOR:-vim} "$COMMIT_MSG_FILE"
      fi
      if [ -s "$COMMIT_MSG_FILE" ]; then
          git commit -F "$COMMIT_MSG_FILE"
      else
          echo "Commit message is empty, commit aborted."
      fi
      rm -f "$COMMIT_MSG_FILE"
    context: files
    output: terminal
  - key: <c-e>
    description: Elaborate AI commits (title + body)
    command: |
      if [ -z "$(git diff --cached --name-only)" ]; then
          echo "No staged changes. Stage files first (space in files panel)."
          exit 0
      fi
      RAW=$(ai-commit-suggest --detailed)
      if [ -z "$RAW" ]; then
          echo "Generation failed or empty."
          exit 1
      fi
      fzf_output=$(printf '%s\n' "$RAW" | perl -0777 -pe 's/\n===COMMIT===\n/\0/g; s/^\n+//; s/\n+$//' \
          | fzf --read0 --height 80% --border --ansi \
          --expect=alt-g \
          --header "<CR>: commit directly  |  <M-g>: edit before commit  |  <Esc>: cancel" \
          --preview "printf '%s\n' {}" --preview-window=up:wrap:70%)
      pressed_key=$(printf '%s' "$fzf_output" | head -n 1)
      selected_msg=$(printf '%s' "$fzf_output" | tail -n +2)
      if [ -z "$selected_msg" ]; then
          exit 0
      fi
      COMMIT_MSG_FILE=$(mktemp)
      printf '%s\n' "$selected_msg" > "$COMMIT_MSG_FILE"
      if [ "$pressed_key" = "alt-g" ]; then
          ${EDITOR:-vim} "$COMMIT_MSG_FILE"
      fi
      if [ -s "$COMMIT_MSG_FILE" ]; then
          git commit -F "$COMMIT_MSG_FILE"
      else
          echo "Commit message is empty, commit aborted."
      fi
      rm -f "$COMMIT_MSG_FILE"
    context: files
    output: terminal
