gui:
  scrollHeight: 10
  scrollOffBehavior: jump
  nerdFontsVersion: "3"
  # everforest dark medium: https://github.com/neanias/everforest-nvim
  theme:
    activeBorderColor:
      - "#e69875"
      - "bold"
    inactiveBorderColor:
      - "#7fbbb3"
    searchingActiveBorderColor:
      - "#e69875"
      - "bold"
    optionsTextColor:
      - "#7fbbb3"
    selectedLineBgColor:
      - "#343f44"
    cherryPickedCommitFgColor:
      - "#7fbbb3"
    cherryPickedCommitBgColor:
      - "#d699b6"
    markedBaseCommitFgColor:
      - "#7fbbb3"
    markedBaseCommitBgColor:
      - "#dbbc7f"
    unstagedChangesColor:
      - "#e67e80"
    defaultFgColor:
      - "#d3c6aa"
customCommands:
  - key: <c-a>
    description: Pick AI commits
    command: |
      ai-commit-suggest \
        | fzf --height 40% --border --ansi --preview "echo {}" --preview-window=up:wrap \
        | {
            read -r selected_msg
            COMMIT_MSG_FILE=$(mktemp)
            echo "$selected_msg" > "$COMMIT_MSG_FILE"
            ${EDITOR:-vim} "$COMMIT_MSG_FILE"
            if [ -s "$COMMIT_MSG_FILE" ]; then
                git commit -F "$COMMIT_MSG_FILE"
            else
                echo "Commit message is empty, commit aborted."
            fi
            rm -f "$COMMIT_MSG_FILE"
        }
    context: files
    output: terminal
