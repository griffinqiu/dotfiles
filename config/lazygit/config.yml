promptToReturnFromSubprocess: false
os:
  editPreset: nvim
gui:
  scrollHeight: 10
  scrollOffBehavior: jump
  nerdFontsVersion: "3"
  # everforest dark medium: https://github.com/neanias/everforest-nvim
  theme:
    activeBorderColor:
      - "#e69875"
      - "bold"
    inactiveBorderColor:
      - "#7fbbb3"
    searchingActiveBorderColor:
      - "#e69875"
      - "bold"
    optionsTextColor:
      - "#7fbbb3"
    selectedLineBgColor:
      - "#343f44"
    cherryPickedCommitFgColor:
      - "#7fbbb3"
    cherryPickedCommitBgColor:
      - "#d699b6"
    markedBaseCommitFgColor:
      - "#7fbbb3"
    markedBaseCommitBgColor:
      - "#dbbc7f"
    unstagedChangesColor:
      - "#e67e80"
    defaultFgColor:
      - "#d3c6aa"
customCommands:
  - key: <c-a>
    description: Pick AI commits (auto short/detailed)
    command: ai-commit-pick
    context: files
    output: terminal
  - key: <c-e>
    description: Force detailed AI commits (title + body)
    command: ai-commit-pick --detailed
    context: files
    output: terminal
  - key: <c-v>
    description: AI MR 助手（建 MR / Review 别人 / 消化评论）
    context: localBranches
    output: terminal
    prompts:
      - type: menu
        key: SkillCmd
        title: AI MR 助手
        options:
          - name: "📝 建 MR（作者自查）"
            value: "/gitlab-mr"
          - name: "👀 Review 别人的 MR"
            value: "/gitlab-mr-review"
          - name: "💬 消化收到的评论"
            value: "/gitlab-mr-resolve"
    command: "mr-claude '{{.Form.SkillCmd}}'"
